name: Publish VSCode Extension

on:
  workflow_dispatch:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            vsce-target: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            vsce-target: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            vsce-target: darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vsce-target: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build LSP server
        run: cargo build --release --target ${{ matrix.target }} -p nextsql-lsp

      - name: Copy LSP binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p nextsql-vscode/bin
          cp target/${{ matrix.target }}/release/nextsql-lsp nextsql-vscode/bin/

      - name: Copy LSP binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p nextsql-vscode/bin
          cp target/${{ matrix.target }}/release/nextsql-lsp.exe nextsql-vscode/bin/

      - name: Install dependencies and build extension
        working-directory: nextsql-vscode
        run: |
          npm install
          npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: nextsql-vscode
        run: vsce package --target ${{ matrix.vsce-target }} -o nextsql-${{ matrix.vsce-target }}.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v6
        with:
          name: vsix-${{ matrix.vsce-target }}
          path: nextsql-vscode/nextsql-${{ matrix.vsce-target }}.vsix

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: vsix-*
          path: vsix/
          merge-multiple: true

      - name: Publish to VS Code Marketplace
        run: |
          npm install -g @vscode/vsce
          for vsix in vsix/*.vsix; do
            vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
