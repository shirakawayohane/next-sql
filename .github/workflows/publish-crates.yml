name: Publish Crates

# Publishes nextsql-backend-rust-runtime and nextsql-tokio-postgres-adapter to crates.io
# Triggered by version tags (same as other release workflows)
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN — crates.io API token

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup default stable

      - name: Publish nextsql-backend-rust-runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p nextsql-backend-rust-runtime

  publish-adapter:
    runs-on: ubuntu-latest
    needs: publish-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup default stable

      - name: Wait for crates.io index to update
        run: sleep 30

      - name: Publish nextsql-tokio-postgres-adapter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p nextsql-tokio-postgres-adapter
