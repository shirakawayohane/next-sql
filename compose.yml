version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: nextsql_postgres
    environment:
      POSTGRES_DB: nextsql
      POSTGRES_USER: nextsql
      POSTGRES_PASSWORD: password
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
